<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handwriting Sheets — WFA</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

  body { margin: 0; font-family: 'Nunito', sans-serif; background: #f4f6f8; min-height: 100vh; }
  .st-header { background: linear-gradient(135deg, #1798d3 0%, #0d7ab8 100%); color: white;
    padding: 0 24px; display: flex; align-items: center; gap: 14px; height: 58px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .st-logo { height: 40px; background: white; border-radius: 8px; padding: 3px 8px; display: block; }
  .st-title { font-weight: 900; font-size: 1.1rem; flex: 1; }
  .st-back { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.85rem;
    font-weight: 700; padding: 6px 12px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.4); transition: all 0.15s; white-space: nowrap; }
  .st-back:hover { background: rgba(255,255,255,0.15); color: white; }
  .st-wrap { max-width: 860px; margin: 0 auto; padding: 28px 24px; }
  .sub { color: #666; font-size: 0.9rem; margin: 0 0 24px; }

  .st-wrap { max-width: 700px; margin: 0 auto; padding: 28px 24px; }
  .card { background: white; border-radius: 14px; padding: 24px; box-shadow: 0 1px 8px rgba(0,0,0,0.07); }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 0.88rem; font-weight: 800; margin-bottom: 6px; }
  .inp, .ta, .sel { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1.5px solid #ddd;
    font-size: 0.9rem; font-family: inherit; box-sizing: border-box; }
  .inp:focus, .ta:focus, .sel:focus { outline: none; border-color: #1798d3; }
  .ta { height: 180px; resize: vertical; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .btn { padding: 10px 22px; background: #1798d3; color: white; border: none; border-radius: 8px;
    font-size: 0.9rem; font-weight: 800; cursor: pointer; transition: opacity 0.15s; font-family: inherit; }
  .btn:hover { opacity: 0.85; }
  .note { font-size: 0.84rem; color: #888; margin-top: 10px; line-height: 1.5; }
  .err { background: #fde8e8; color: #9b1c1c; padding: 10px 14px; border-radius: 8px;
    margin-bottom: 16px; font-size: 0.88rem; font-weight: 600; }
</style>
</head>
<body>
<div class="st-header">
  <img class="st-logo" src="https://cdn.jsdelivr.net/gh/wallscourtfarm/wfa-shared@main/web/wfa_logo.webp" alt="WFA">
  <span class="st-title">✏️ Handwriting Sheet Generator</span>
  <a class="st-back" href="https://staff.wallscourt-farm-academy.co.uk">← Staff Tools</a>
</div>
<div class="st-wrap">
  <p class="sub">Type words or sentences, choose a font style, and download a print-ready PDF.</p>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="post" action="{{ url_for('handwriting.handwriting_generate') }}">
    <div class="card">
      <div class="field">
        <label for="title">Sheet title</label>
        <input class="inp" type="text" id="title" name="title" value="Handwriting Practice" maxlength="80">
      </div>
      <div class="field">
        <label for="content">Words or sentences — one per line</label>
        <textarea class="ta" id="content" name="content"
          placeholder="The cat sat on the mat.&#10;She ran quickly down the hill.&#10;big brave brilliant"></textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label for="font">Font style</label>
          <select class="sel" id="font" name="font">
            <option value="sassoon">Print — Sassoon Dotted</option>
            <option value="linkpen">Pre-cursive — Linkpen Dotted</option>
            <option value="xccw" selected>Cursive — XCCW Dotted</option>
          </select>
        </div>
        <div class="field">
          <label for="practice_lines">Practice lines after each item</label>
          <select class="sel" id="practice_lines" name="practice_lines">
            <option value="0">0 lines</option>
            <option value="1">1 line</option>
            <option value="2">2 lines</option>
            <option value="3">3 lines</option>
          </select>
        </div>
      </div>
      <div class="field" style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <input type="checkbox" id="show_midline" name="show_midline" value="1" style="width:18px;height:18px;accent-color:#1798d3;cursor:pointer;flex-shrink:0">
        <label for="show_midline" style="margin:0;font-size:0.88rem;font-weight:800;cursor:pointer">Show x-height line (dashed mid-line at top of letters without ascenders)</label>
      </div>
      <div class="field" style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
        <input type="checkbox" id="show_descline" name="show_descline" value="1" style="width:18px;height:18px;accent-color:#1798d3;cursor:pointer;flex-shrink:0">
        <label for="show_descline" style="margin:0;font-size:0.88rem;font-weight:800;cursor:pointer">Show descender line (dashed line at bottom of letters like g, p, y)</label>
      </div>
      <button class="btn" type="submit">⬇ Generate &amp; Download PDF</button>
      <p class="note">The PDF downloads instantly. Fonts are embedded — print-ready.</p>
    </div>
  </form>
</div>
<div style="position:fixed;bottom:6px;right:8px;font-size:10px;font-weight:600;opacity:0.5;pointer-events:none;z-index:9999">30.06.26g</div>
</body>
</html>
