<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Oops</title>
<style>
body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;background:#f8fafc;margin:0;text-align:center;padding:24px}
.box{background:white;border-radius:16px;padding:40px 32px;box-shadow:0 4px 20px rgba(0,0,0,.1);max-width:380px}
.icon{font-size:56px;margin-bottom:16px}
h1{font-size:20px;color:#1a3c6e;margin-bottom:10px}

</style>
</head>
<body>
<div class="box">
  <div class="icon">😕</div>
  <h1>Something went wrong</h1>
  <p>{{ msg }}</p>
</div>
</body>
</html>
