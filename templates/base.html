<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}WFA Staff{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="topnav">
    <a href="{{ url_for('dash.dashboard') }}" class="nav-brand">🏫 WFA <span class="nav-version">v26.05.23q</span></a>
    <div class="nav-links">

      <a href="{{ url_for('dash.dashboard') }}"
         class="nav-item {% if request.endpoint == 'dash.dashboard' %}active{% endif %}">
        📊 Dashboard
      </a>

      <!-- Assessment dropdown -->
      <div class="nav-dropdown {% if request.endpoint in ['bee.spelling_bee','tt.tt_check','stubs.word_assessment','stubs.rule_reassessment','stubs.digital_ipad'] %}active{% endif %}">
        <span class="nav-item nav-dropdown-toggle">✅ Assessment ▾</span>
        <div class="dropdown-menu">
          <a href="{{ url_for('bee.spelling_bee') }}"
             class="{% if request.endpoint=='bee.spelling_bee' %}active{% endif %}">
            🐝 Spelling Bee
          </a>
          <a href="{{ url_for('tt.tt_check') }}"
             class="{% if request.endpoint=='tt.tt_check' %}active{% endif %}">
            🔢 TT Check
          </a>
          <a href="{{ url_for('stubs.word_assessment') }}"
             class="{% if request.endpoint=='stubs.word_assessment' %}active{% endif %}">
            📋 Word Assessment
          </a>
          <a href="{{ url_for('stubs.rule_reassessment') }}"
             class="{% if request.endpoint=='stubs.rule_reassessment' %}active{% endif %}">
            📏 Rule Reassessment
          </a>
          <a href="{{ url_for('stubs.digital_ipad') }}"
             class="{% if request.endpoint=='stubs.digital_ipad' %}active{% endif %}">
            💻 Digital / iPad
          </a>
        </div>
      </div>

      <a href="{{ url_for('learners.learners') }}"
         class="nav-item {% if request.endpoint=='learners.learners' %}active{% endif %}">
        👤 Learners
      </a>

      <a href="{{ url_for('hl.home_learning') }}"
         class="nav-item {% if request.endpoint=='hl.home_learning' %}active{% endif %}">
        🏠 Home Learning
      </a>

    <a href="{{ url_for('rules.rules') }}"
         class="nav-item {% if request.endpoint=='rules.rules' %}active{% endif %}">
        📚 Rules
      </a>

      <a href="{{ url_for('stubs.print_tools') }}"
         class="nav-item {% if request.endpoint=='stubs.print_tools' %}active{% endif %}">
        🖨️ Print
      </a>

      <a href="{{ url_for('stubs.classes') }}"
         class="nav-item {% if request.endpoint=='stubs.classes' %}active{% endif %}">
        👥 Classes
      </a>

      <a href="{{ url_for('settings.settings') }}"
         class="nav-item {% if request.endpoint=='settings.settings' %}active{% endif %}">
        ⚙️ Settings
      </a>

    </div>
    <a href="{{ url_for('auth.logout') }}" class="nav-logout">Log out</a>
  </nav>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
