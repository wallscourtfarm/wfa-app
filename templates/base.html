<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}WFA{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="topnav">
    <span class="nav-brand">🏫 WFA</span>
    <div class="nav-links">
      <a href="{{ url_for('dash.dashboard') }}"
         class="{% if request.endpoint == 'dash.dashboard' %}active{% endif %}">📊 Dashboard</a>
      <a href="{{ url_for('bee.spelling_bee') }}"
         class="{% if request.endpoint == 'bee.spelling_bee' %}active{% endif %}">🐝 Spelling Bee</a>
      <a href="{{ url_for('tt.tt_check') }}"
         class="{% if request.endpoint == 'tt.tt_check' %}active{% endif %}">🔢 TT Check</a>
    </div>
    <a href="{{ url_for('auth.logout') }}" class="nav-logout">Log out</a>
  </nav>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
