<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WFA — Sign in</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">🏫</div>
    <h1>Wallscourt Farm Academy</h1>
    <p class="login-sub">Staff Tools</p>

    {% if error %}
      <p class="login-error">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ url_for('auth.login') }}">
      <input
        type="password"
        name="password"
        placeholder="Password"
        autofocus
        autocomplete="current-password"
        class="login-input"
      >
      <button type="submit" class="login-btn">Sign in</button>
    </form>
  </div>
<div style="position:fixed;bottom:6px;right:8px;font-size:10px;font-weight:600;opacity:0.5;pointer-events:none;z-index:9999">15.06.26a</div>
</body>
</html>
