{% extends "base.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
<div class="page-header">
  <h2>⚙️ Settings</h2>
</div>

<div id="status-bar" class="status-bar hidden"></div>

<div class="settings-wrap">

  <!-- Week reference -->
  <div class="settings-section">
    <h3 class="settings-heading">Week</h3>
    <div class="settings-row">
      <label class="settings-label">Current week reference</label>
      <select id="week_ref" class="hl-input" style="max-width:150px">
        <option value="">— select —</option>
        {% set term_weeks = [
          ('Autumn 1', 1, 7),
          ('Autumn 2', 2, 7),
          ('Spring 1', 3, 6),
          ('Spring 2', 4, 6),
          ('Summer 1', 5, 6),
          ('Summer 2', 6, 7)
        ] %}
        {% for label, t, wmax in term_weeks %}
          <optgroup label="{{ label }} (T{{ t }})">
            {% for w in range(1, wmax + 1) %}
              <option value="T{{ t }}W{{ w }}"
                {% if wc.get('week_ref', '') == 'T' ~ t ~ 'W' ~ w %}selected{% endif %}>
                T{{ t }}W{{ w }}
              </option>
            {% endfor %}
          </optgroup>
        {% endfor %}
      </select>
    </div>
  </div>

  <!-- Spelling rules — single set for all classes -->
  {% set cls_cfg = wc.get('classes', {}).get('Y4_IM', {}) %}
  <div class="settings-section">
    <h3 class="settings-heading">Spelling rules</h3>
    <div class="settings-row">
      <label class="settings-label">Main rule</label>
      <select id="main_rule" class="cls-select" style="max-width:420px">
        <option value="">— None —</option>
        {% for rid, label in rules %}
        <option value="{{ rid }}" {% if rid == cls_cfg.get('main_rule_id') %}selected{% endif %}>
          {{ label }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="settings-row">
      <label class="settings-label">Revision rule</label>
      <select id="revision_rule" class="cls-select" style="max-width:420px">
        <option value="">— None —</option>
        {% for rid, label in rules %}
        <option value="{{ rid }}" {% if rid == cls_cfg.get('revision_rule_id') %}selected{% endif %}>
          {{ label }}
        </option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="settings-save-row">
    <button class="btn btn-primary btn-lg" onclick="saveSettings()">💾 Save settings</button>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
async function saveSettings() {
  const week_ref       = document.getElementById('week_ref').value.trim();
  const main_rule_id   = document.getElementById('main_rule').value || null;
  const rev_rule_id    = document.getElementById('revision_rule').value || null;

  // Apply same rules to both classes
  const classes = {};
  ['Y4_IM', 'Y4_WU'].forEach(cls => {
    classes[cls] = { main_rule_id: main_rule_id, revision_rule_id: rev_rule_id };
  });

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const res  = await fetch('/api/settings/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({week_ref, classes})
    });
    const data = await res.json();
    btn.disabled = false;
    btn.textContent = '💾 Save settings';
    if (data.ok) {
      showStatus('✓ Settings saved.', 'success');
    } else {
      showStatus('Error: ' + (data.error || 'Unknown'), 'error');
    }
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '💾 Save settings';
    showStatus('Network error.', 'error');
  }
}

const statusBar = document.getElementById('status-bar');
function showStatus(msg, type) {
  statusBar.textContent = msg;
  statusBar.className = `status-bar status-${type}`;
  if (type !== 'error') setTimeout(() => { statusBar.className = 'status-bar hidden'; }, 3500);
}
</script>
{% endblock %}
